<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex all properties</title>
    <style>
        .container{
            border: 2px;
            height: 300px;
            display:flex;

        }
        .item{
            background:#79c8ea;
            padding: 20px 10px 5px 5px;
            border:1px solid;
            font-style: normal;
            font-weight: 100;
            font-display: auto;
        }
    </style>
</head>
<body>
    <h2>All properties</h2>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
    </div>
    
    
</body>
</html>
